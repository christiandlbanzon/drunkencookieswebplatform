version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drunken_cookies
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/drunken_cookies
      JWT_SECRET: dev-secret-change-in-prod
      CORS_ORIGINS: '["http://localhost:3000"]'
      TIMEZONE: America/Puerto_Rico
      DUAL_WRITE_ENABLED: "false"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
